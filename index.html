<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>DOCS GUARD — WHERE IMPORTANT DOCUMENTS FIND THEIR HOME</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
--bg:#f0f4fb;--panel:#fff;--card:#f7f9ff;--card2:#eef2fb;
--border:#dce3f0;--border2:#c5d0e8;
--acc:#1d4ed8;--acc-l:#eff6ff;--acc-m:#bfdbfe;
--green:#047857;--green-l:#ecfdf5;
--amber:#b45309;--amber-l:#fffbeb;
--red:#b91c1c;--red-l:#fef2f2;
--purple:#6d28d9;--purple-l:#f5f3ff;
--teal:#0f766e;--teal-l:#f0fdfa;
--text:#0f172a;--text2:#475569;--text3:#94a3b8;
--sb:260px;
--sh:0 1px 4px rgba(15,23,42,.07),0 4px 16px rgba(15,23,42,.05);
--sh2:0 2px 8px rgba(15,23,42,.09),0 8px 32px rgba(15,23,42,.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
.hidden{display:none!important}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
/* LOGIN */
#ls{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 50%,#3b82f6 100%)}
.lw{width:100%;max-width:400px}
.lb{text-align:center;margin-bottom:2rem}
.lb-ic{width:68px;height:68px;border-radius:20px;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.lb-ic svg{width:32px;height:32px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.lb-n{font-size:26px;font-weight:900;letter-spacing:4px;color:#fff}
.lb-s{font-size:10px;color:rgba(255,255,255,.65);letter-spacing:2px;font-weight:600;margin-top:4px}
.lc{background:#fff;border-radius:18px;padding:2rem;box-shadow:0 20px 60px rgba(0,0,0,.18)}
.rtabs{display:flex;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:3px;margin-bottom:1.5rem;gap:3px}
.rt{flex:1;padding:9px;border:none;background:transparent;color:var(--text2);font-size:11px;font-weight:700;letter-spacing:1px;border-radius:7px;cursor:pointer;transition:.15s;font-family:'Inter',sans-serif;text-transform:uppercase}
.rt.active{background:var(--acc);color:#fff;box-shadow:0 2px 8px rgba(29,78,216,.3)}
.lf{margin-bottom:14px}
.lf label{display:block;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text2);margin-bottom:6px;text-transform:uppercase}
.lf input,.lf select{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:9px;padding:11px 14px;font-size:13px;color:var(--text);outline:none;transition:.2s;font-family:'Inter',sans-serif;font-weight:500}
.lf input:focus,.lf select:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(29,78,216,.1);background:#fff}
.lf select option{background:#fff}
.l-err{background:var(--red-l);border:1.5px solid rgba(185,28,28,.2);color:var(--red);border-radius:9px;padding:10px 14px;font-size:12px;font-weight:600;margin-bottom:12px;display:none}
.lbtn{width:100%;background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;border:none;border-radius:10px;padding:13px;font-size:13px;font-weight:700;letter-spacing:1.5px;cursor:pointer;font-family:'Inter',sans-serif;text-transform:uppercase;box-shadow:0 4px 16px rgba(29,78,216,.3);transition:.2s}
.lbtn:hover{opacity:.9;transform:translateY(-1px)}.lbtn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.lft{text-align:center;margin-top:.75rem;font-size:10px;color:rgba(255,255,255,.4);letter-spacing:1px;font-weight:600}
/* APP */
#app{display:flex;height:100vh;overflow:hidden}
.sb{width:var(--sb);background:var(--panel);border-right:1.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;box-shadow:var(--sh)}
.sb-top{padding:1.1rem 1rem;border-bottom:1.5px solid var(--border)}
.sb-br{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sb-ic{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(29,78,216,.22)}
.sb-ic svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sb-bn{font-size:15px;font-weight:900;letter-spacing:2px;color:var(--acc)}
.sb-bv{font-size:9px;color:var(--text3);letter-spacing:.5px;font-weight:600}
.sb-u{background:linear-gradient(135deg,var(--acc-l),#e0eaff);border:1.5px solid var(--acc-m);border-radius:10px;padding:10px 12px}
.sb-ur{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px}
.sb-ur-a{color:var(--amber)}.sb-ur-u{color:var(--acc)}
.sb-un{font-size:13px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-ud{font-size:11px;color:var(--text2);font-weight:500}
.sb-nav{flex:1;padding:.75rem;overflow-y:auto}
.sb-s{font-size:9px;font-weight:800;letter-spacing:2px;color:var(--text3);padding:0 .5rem;margin:1.25rem 0 .4rem;text-transform:uppercase}
.sb-s:first-child{margin-top:0}
.nb{width:100%;display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;border:none;background:transparent;color:var(--text2);font-size:11px;font-weight:700;letter-spacing:.3px;cursor:pointer;transition:.12s;text-align:left;font-family:'Inter',sans-serif;text-transform:uppercase}
.nb:hover{background:var(--acc-l);color:var(--acc)}
.nb.active{background:var(--acc);color:#fff;box-shadow:0 2px 8px rgba(29,78,216,.22)}
.nb svg{width:15px;height:15px;flex-shrink:0;stroke:currentColor}
.sb-ft{padding:.75rem;border-top:1.5px solid var(--border)}
.lo{width:100%;display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;border:none;background:transparent;color:var(--text2);font-size:11px;font-weight:700;letter-spacing:.3px;cursor:pointer;transition:.12s;text-transform:uppercase;font-family:'Inter',sans-serif}
.lo:hover{background:var(--red-l);color:var(--red)}
.lo svg{width:15px;height:15px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;padding:0 1.5rem;background:var(--panel);border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:var(--sh)}
.tb-t{font-size:15px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--text)}
.tb-r{display:flex;align-items:center;gap:8px}
.tb-sec{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--green);background:var(--green-l);border:1.5px solid rgba(4,120,87,.15);padding:5px 12px;border-radius:20px}
.tb-cl{font-size:11px;color:var(--text2);background:var(--card);border:1.5px solid var(--border);padding:6px 12px;border-radius:8px;font-weight:600}
.content{flex:1;overflow-y:auto;padding:1.5rem}
/* STATS */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:1.5rem}
.sc{background:var(--panel);border:1.5px solid var(--border);border-radius:14px;padding:1rem 1.25rem;box-shadow:var(--sh);position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--sc,var(--acc));border-radius:14px 14px 0 0}
.sc-l{font-size:9px;font-weight:800;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;margin-bottom:8px}
.sc-n{font-size:28px;font-weight:900;color:var(--sc,var(--acc));line-height:1}
.sc-s{font-size:10px;color:var(--text3);margin-top:4px;font-weight:600}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1.5px solid var(--border);background:var(--panel);color:var(--text2);font-size:11px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:.15s;font-family:'Inter',sans-serif;text-transform:uppercase;white-space:nowrap;box-shadow:var(--sh)}
.btn:hover{border-color:var(--border2);color:var(--text);transform:translateY(-1px)}
.btn svg{width:13px;height:13px;flex-shrink:0;stroke:currentColor}
.btn-p{background:linear-gradient(135deg,#1d4ed8,#2563eb);border-color:transparent;color:#fff;box-shadow:0 2px 10px rgba(29,78,216,.22)}
.btn-p:hover{opacity:.9;color:#fff}
.btn-g{background:var(--green-l);border-color:rgba(4,120,87,.2);color:var(--green)}
.btn-g:hover{background:#d1fae5;color:var(--green)}
.btn-d{background:var(--red-l);border-color:rgba(185,28,28,.15);color:var(--red)}
.btn-d:hover{background:#fee2e2;color:var(--red)}
.btn-a{background:var(--amber-l);border-color:rgba(180,83,9,.15);color:var(--amber)}
.btn-a:hover{background:#fef3c7;color:var(--amber)}
.btn-t{background:var(--teal-l);border-color:rgba(15,118,110,.2);color:var(--teal)}
.btn-t:hover{background:#ccfbf1;color:var(--teal)}
.btn-sm{padding:5px 12px;font-size:10px}
.btn-xs{padding:3px 8px;font-size:10px}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.bd-b{background:var(--acc-l);color:var(--acc);border:1.5px solid var(--acc-m)}
.bd-g{background:var(--green-l);color:var(--green);border:1.5px solid rgba(4,120,87,.2)}
.bd-a{background:var(--amber-l);color:var(--amber);border:1.5px solid rgba(180,83,9,.2)}
.bd-r{background:var(--red-l);color:var(--red);border:1.5px solid rgba(185,28,28,.2)}
.bd-p{background:var(--purple-l);color:var(--purple);border:1.5px solid rgba(109,40,217,.2)}
.bd-t{background:var(--teal-l);color:var(--teal);border:1.5px solid rgba(15,118,110,.2)}
.bd-gr{background:var(--card2);color:var(--text2);border:1.5px solid var(--border)}
/* TABLE */
.tw{background:var(--panel);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--sh)}
table{width:100%;border-collapse:collapse}
th{background:var(--card);padding:11px 16px;font-size:9px;font-weight:800;letter-spacing:1.5px;color:var(--text3);text-align:left;border-bottom:1.5px solid var(--border);text-transform:uppercase;white-space:nowrap}
td{padding:12px 16px;border-bottom:1.5px solid var(--border);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--acc-l)}
.tdax{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
/* AVATAR */
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;text-transform:uppercase}
.av-b{background:var(--acc-l);color:var(--acc)}.av-g{background:var(--green-l);color:var(--green)}
.av-p{background:var(--purple-l);color:var(--purple)}.av-a{background:var(--amber-l);color:var(--amber)}
.nr{display:flex;align-items:center;gap:10px}
/* FILE ICONS */
.fic{width:38px;height:42px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0;border:1.5px solid}
.fi-p{background:var(--red-l);color:var(--red);border-color:rgba(185,28,28,.2)}
.fi-x{background:var(--green-l);color:var(--green);border-color:rgba(4,120,87,.2)}
.fi-d{background:var(--acc-l);color:var(--acc);border-color:var(--acc-m)}
.fi-i{background:#fdf2f8;color:#be185d;border-color:rgba(190,24,93,.2)}
.fi-z{background:var(--amber-l);color:var(--amber);border-color:rgba(180,83,9,.2)}
.fi-f{background:var(--purple-l);color:var(--purple);border-color:rgba(109,40,217,.2)}
/* FORMS */
.fg{display:flex;flex-direction:column;gap:6px}
.fg label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text2);text-transform:uppercase}
.fg input,.fg select,.fg textarea{background:var(--card);border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;font-size:13px;color:var(--text);outline:none;transition:.15s;width:100%;font-family:'Inter',sans-serif;font-weight:500}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(29,78,216,.1);background:#fff}
.fg select option{background:#fff}
.fg textarea{resize:vertical;min-height:75px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
/* FILE DROP */
.fd{border:2px dashed var(--border2);border-radius:12px;padding:2rem;text-align:center;cursor:pointer;transition:.2s;color:var(--text3);background:var(--card)}
.fd:hover,.fd.drag{border-color:var(--acc);background:var(--acc-l);color:var(--acc)}
.fd.has-f{border-color:var(--green);background:var(--green-l);color:var(--green)}
.fd svg{width:36px;height:36px;margin:0 auto 12px;display:block;opacity:.45;stroke:currentColor}
.fd.has-f svg,.fd:hover svg{opacity:.8}
.fd-t{font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.fd-s{font-size:11px;margin-top:4px}
/* MODAL */
.mov{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.modal{background:#fff;border:1.5px solid var(--border);border-radius:18px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(15,23,42,.18)}
.modal-lg{max-width:700px}
.mh{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1.5rem;border-bottom:1.5px solid var(--border);position:sticky;top:0;background:#fff;z-index:1}
.mh h3{font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--text);display:flex;align-items:center;gap:8px}
.mc{width:30px;height:30px;border-radius:8px;background:var(--card);border:1.5px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:18px;transition:.15s}
.mc:hover{background:var(--red-l);color:var(--red)}
.mb{padding:1.5rem}
.mf{padding:1rem 1.5rem;border-top:1.5px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
/* INFO CARD */
.ic{background:var(--panel);border:1.5px solid var(--border);border-radius:14px;padding:1.25rem;box-shadow:var(--sh)}
.ic h4{font-size:9px;font-weight:800;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;margin-bottom:.75rem}
/* SEARCH */
.sw{position:relative;flex:1;min-width:160px}
.sw svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text3);stroke:currentColor;fill:none}
.sw input{width:100%;background:var(--panel);border:1.5px solid var(--border);border-radius:9px;padding:9px 12px 9px 34px;font-size:12px;color:var(--text);outline:none;font-family:'Inter',sans-serif;font-weight:500}
.sw input:focus{border-color:var(--acc)}
.fr-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.fr-row select{background:var(--panel);border:1.5px solid var(--border);border-radius:9px;padding:8px 12px;font-size:11px;color:var(--text);outline:none;font-family:'Inter',sans-serif;font-weight:600}
/* HISTORY */
.hi{display:flex;gap:12px;padding:10px 0;border-bottom:1.5px solid var(--border)}
.hi:last-child{border-bottom:none}
.hd{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px}
.hb{flex:1}.ha{font-size:12px;font-weight:700;color:var(--text)}.hm{font-size:11px;color:var(--text2);margin-top:1px}
.ht{font-size:10px;color:var(--text3);text-align:right;white-space:nowrap;font-weight:600}
/* NOTICES */
.nt{border-radius:10px;padding:12px 14px;font-size:12px;display:flex;gap:10px;align-items:flex-start;margin-bottom:1.25rem;font-weight:500}
.nt svg{width:15px;height:15px;flex-shrink:0;margin-top:1px;stroke:currentColor;fill:none}
.nt-b{background:var(--acc-l);border:1.5px solid var(--acc-m);color:var(--acc)}
.nt-a{background:var(--amber-l);border:1.5px solid rgba(180,83,9,.2);color:var(--amber)}
.nt-r{background:var(--red-l);border:1.5px solid rgba(185,28,28,.2);color:var(--red)}
.nt-g{background:var(--green-l);border:1.5px solid rgba(4,120,87,.2);color:var(--green)}
/* PROGRESS */
.pw{display:none;margin-top:1.25rem}
.pl{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--text2);margin-bottom:6px;text-transform:uppercase}
.pb{background:var(--border);border-radius:10px;height:6px;overflow:hidden}
.pf{height:100%;border-radius:10px;background:linear-gradient(90deg,#1d4ed8,#3b82f6);transition:.3s}
/* BREADCRUMB */
.bc{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--text3);margin-bottom:1rem;text-transform:uppercase;flex-wrap:wrap;background:var(--panel);border:1.5px solid var(--border);padding:10px 14px;border-radius:10px;box-shadow:var(--sh)}
.bc a{color:var(--acc);cursor:pointer}.bc a:hover{text-decoration:underline}.bc strong{color:var(--text)}
/* GRID CARDS */
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.dc{background:var(--panel);border:1.5px solid var(--border);border-radius:14px;padding:1.25rem;cursor:pointer;transition:.25s cubic-bezier(.34,1.56,.64,1);box-shadow:var(--sh);position:relative}
.dc:hover{border-color:var(--acc);transform:translateY(-4px) scale(1.02);box-shadow:0 12px 32px rgba(29,78,216,.18),0 4px 12px rgba(29,78,216,.1)}
.dc-locked{cursor:default;opacity:.55}
.dc-locked:hover{border-color:var(--border);transform:none;box-shadow:var(--sh)}
/* 3D FOLDER STYLES */
.folder-3d{width:54px;height:48px;position:relative;flex-shrink:0}
.folder-3d .f-back{position:absolute;bottom:0;left:0;right:0;height:38px;background:linear-gradient(145deg,#fbbf24,#d97706);border-radius:4px 4px 5px 5px;box-shadow:0 4px 8px rgba(217,119,6,.4),0 2px 4px rgba(217,119,6,.3),inset 0 1px 0 rgba(255,255,255,.3)}
.folder-3d .f-tab{position:absolute;top:6px;left:0;width:22px;height:10px;background:linear-gradient(145deg,#fcd34d,#f59e0b);border-radius:3px 6px 0 0;box-shadow:inset 0 1px 0 rgba(255,255,255,.4)}
.folder-3d .f-front{position:absolute;bottom:3px;left:2px;right:2px;height:30px;background:linear-gradient(145deg,#fcd34d,#fbbf24);border-radius:3px 3px 4px 4px;box-shadow:inset 0 1px 0 rgba(255,255,255,.5),inset 0 -1px 0 rgba(0,0,0,.1)}
.folder-3d.teal .f-back{background:linear-gradient(145deg,#2dd4bf,#0f766e);box-shadow:0 4px 8px rgba(15,118,110,.4)}
.folder-3d.teal .f-tab{background:linear-gradient(145deg,#5eead4,#14b8a6)}
.folder-3d.teal .f-front{background:linear-gradient(145deg,#5eead4,#2dd4bf)}
.folder-3d.blue .f-back{background:linear-gradient(145deg,#60a5fa,#1d4ed8);box-shadow:0 4px 8px rgba(29,78,216,.4)}
.folder-3d.blue .f-tab{background:linear-gradient(145deg,#93c5fd,#3b82f6)}
.folder-3d.blue .f-front{background:linear-gradient(145deg,#93c5fd,#60a5fa)}
.folder-3d.green .f-back{background:linear-gradient(145deg,#34d399,#047857);box-shadow:0 4px 8px rgba(4,120,87,.4)}
.folder-3d.green .f-tab{background:linear-gradient(145deg,#6ee7b7,#10b981)}
.folder-3d.green .f-front{background:linear-gradient(145deg,#6ee7b7,#34d399)}
.folder-3d.gray .f-back{background:linear-gradient(145deg,#94a3b8,#475569);box-shadow:0 4px 8px rgba(71,85,105,.3)}
.folder-3d.gray .f-tab{background:linear-gradient(145deg,#cbd5e1,#64748b)}
.folder-3d.gray .f-front{background:linear-gradient(145deg,#cbd5e1,#94a3b8)}
.folder-3d.red .f-back{background:linear-gradient(145deg,#f87171,#b91c1c);box-shadow:0 4px 8px rgba(185,28,28,.4)}
.folder-3d.red .f-tab{background:linear-gradient(145deg,#fca5a5,#ef4444)}

if(['mp3','wav'].includes(x)||mi.includes('audio'))return['fi-p','AUD'];

}

};
tick();timers[docId]=setInterval(tick,1000);
}

});

function doDl(url,filename){
fetch(url).then(r=>r.blob()).then(blob=>{
const bu=URL.createObjectURL(blob);
const a=document.createElement('a');a.href=bu;a.download=filename;a.style.display='none';
document.body.appendChild(a);a.click();
setTimeout(()=>{URL.revokeObjectURL(bu);document.body.removeChild(a);},1000);
toast('DOWNLOAD STARTED — CHECK YOUR DOWNLOADS FOLDER ✓');
}).catch(()=>{
const a=document.createElement('a');a.href=url;a.download=filename;a.click();
toast('DOWNLOAD STARTED ✓');
});
}

// EMAIL REMINDER via mailto (opens email client)
async function sendReminderEmail(id){
const {data:ex}=await sb.from('dv_doc_expiry').select('*,dv_documents(title,company,dept)').eq('id',id).maybeSingle();
if(!ex)return;
const today=new Date();
const expDate=new Date(ex.expiry_date);
const diffDays=Math.ceil((expDate-today)/(1000*60*60*24));
const docTitle=(ex.dv_documents?.title||'DOCUMENT').toUpperCase();
const subject=`REMINDER: ${docTitle} EXPIRES IN ${diffDays} DAYS`;
const body=`Dear Team,%0A%0ADOCUMENT EXPIRY REMINDER%0A%0ADocument: ${docTitle}%0ADescription: ${ex.renewal_notes||''}%0ACompany: ${ex.dv_documents?.company||''}%0ADepartment: ${ex.dv_documents?.dept||''}%0AIssue Date: ${ex.issue_date||''}%0AExpiry Date: ${ex.expiry_date||''}%0ADays Remaining: ${diffDays}%0A%0APlease take action immediately to renew this document before expiry.%0A%0ARegards,%0ADOCS GUARD SYSTEM`;
const to=ex.admin_email+(ex.user_email?','+ex.user_email:'');
window.open(`mailto:${to}?subject=${subject}&body=${body}`);
await sb.from('dv_doc_expiry').update({last_reminder_sent:new Date().toISOString().split('T')[0],reminder_count:(ex.reminder_count||0)+1}).eq('id',id);
toast('EMAIL CLIENT OPENED — PLEASE REVIEW AND SEND THE EMAIL ✓');
}

async function sendAllReminders(){
const today=new Date();today.setHours(0,0,0,0);
const {data:exp}=await sb.from('dv_doc_expiry').select('*,dv_documents(title,company,dept)').eq('is_renewal',true).eq('is_renewed',false);
const due=(exp||[]).filter(ex=>{const d=new Date(ex.expiry_date);d.setHours(0,0,0,0);return Math.ceil((d-today)/(1000*60*60*24))<=30;});
if(!due.length){toast('NO DOCUMENTS EXPIRING WITHIN 30 DAYS','info');return;}
for(const ex of due)await sendReminderEmail(ex.id);
toast(`${due.length} REMINDERS SENT SUCCESSFULLY ✓`);
}

}

// RENAME FOLDER
function renameFolder(id,oldName,type,co='',fy='',dp=''){
openModal(`
<div class="mh"><h3>✏ RENAME FOLDER</h3><div class="mc" onclick="cm()">&#215;</div></div>
<div class="mb">
<div class="fg"><label>CURRENT NAME</label><input disabled value="${e(oldName.toUpperCase())}" style="opacity:.6"></div>
<div class="fg" style="margin-top:12px"><label>NEW FOLDER NAME *</label><input id="rf-name" placeholder="NEW NAME" value="${e(oldName.toUpperCase())}"></div>
</div>
<div class="mf">
<button class="btn" onclick="cm()">CANCEL</button>
<button class="btn btn-p" onclick="doRenameFolder(${id},'${type}','${e(co)}','${e(fy)}','${e(dp)}')">RENAME</button>
</div>`);
setTimeout(()=>{const i=document.getElementById('rf-name');if(i){i.focus();i.select();}},100);
}

async function doRenameFolder(id,type,co,fy,dp){
const name=(document.getElementById('rf-name').value.trim()||'').toUpperCase();
if(!name)return toast('NEW FOLDER NAME IS REQUIRED','err');
const {error}=await sb.from('dv_folders').update({name}).eq('id',id);
if(error){toast(error.message,'err');return;}
toast('FOLDER RENAMED SUCCESSFULLY ✓');cm();
if(type==='personal')nav('browse');
else bFol(co,fy,dp);
}

// DELETE FOLDER
async function deleteFolder(id,name,type,co='',fy='',dp=''){
openModal(`
<div class="mh"><h3>${I.tr} DELETE FOLDER</h3><div class="mc" onclick="cm()">&#215;</div></div>
<div class="mb">
<div class="nt nt-r">${I.wn}<span><strong>WARNING:</strong> FOLDER "${e(name.toUpperCase())}" WILL BE PERMANENTLY DELETED. DOCUMENTS INSIDE WILL NOT BE DELETED — THEY WILL BE MOVED TO ROOT.</span></div>
<div style="background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:1rem;font-size:12px;font-weight:700;color:var(--text2)">
FOLDER NAME: <strong style="color:var(--red)">${e(name.toUpperCase())}</strong>
</div>
</div>
<div class="mf">
<button class="btn" onclick="cm()">CANCEL</button>
<button class="btn btn-d" onclick="doDeleteFolder(${id},'${type}','${e(co)}','${e(fy)}','${e(dp)}')">${I.tr} DELETE FOLDER</button>
</div>`);
}

async function doDeleteFolder(id,type,co,fy,dp){
// Move docs to root first
await sb.from('dv_documents').update({folder_id:null}).eq('folder_id',id);
// Delete folder access records
await sb.from('dv_folder_access').delete().eq('folder_id',id);
// Delete folder
const {error}=await sb.from('dv_folders').delete().eq('id',id);
if(error){toast(error.message,'err');return;}
toast('FOLDER DELETED — DOCUMENTS MOVED TO ROOT SUCCESSFULLY ✓','warn');cm();
if(type==='personal')nav('browse');
else bFol(co,fy,dp);
}
// ═══ FULL ACCESS PANEL ═══
async function openAccessPanel(userId,userName){
const {data:u}=await sb.from('dv_users').select('*').eq('id',userId).maybeSingle();
const {data:cos}=await sb.from('dv_companies').select('name').order('name');
const {data:acc}=await sb.from('dv_user_dept_access').select('*').eq('user_id',userId);
const DEPTS=['COMPLIANCE','FINANCE','HR','IT','LEGAL','MANAGEMENT','MARKETING','OPERATIONS'];
const permRow=(label,field,val,color)=>`
<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:9px">
<div>
<div style="font-size:12px;font-weight:700;color:var(--text)">${label}</div>
<div style="font-size:10px;color:var(--text3);margin-top:2px">${val?'CURRENTLY ENABLED':'CURRENTLY DISABLED'}</div>
</div>
<button class="btn btn-sm ${val?'btn-g':'btn-d'}" id="perm-${field}" onclick="togglePerm(${userId},'${field}',this)">
${val?'✓ ENABLED':'✗ DISABLED'}
</button>
</div>`;
openModal(`
<div class="mh"><h3>${I.ac} ACCESS CONTROL: ${e(userName.toUpperCase())}</h3><div class="mc" onclick="cm()">&#215;</div></div>
<div class="mb">
<div style="margin-bottom:1.5rem">
<div style="font-size:10px;font-weight:800;letter-spacing:1.5px;color:var(--text3);margin-bottom:.75rem;display:flex;align-items:center;gap:6px">${I.sh} SYSTEM PERMISSIONS</div>
<div style="display:grid;gap:8px">
${permRow('VIEW DOCUMENTS','can_view',u?.can_view!==false,'green')}
${permRow('UPLOAD DOCUMENTS','can_upload',u?.can_upload||false,'green')}
${permRow('DOWNLOAD DOCUMENTS','can_download',u?.can_download||false,'blue')}
${permRow('CREATE FOLDERS','can_create_folder',u?.can_create_folder||false,'teal')}
</div>
</div>
<div>
<div style="font-size:10px;font-weight:800;letter-spacing:1.5px;color:var(--text3);margin-bottom:.75rem;display:flex;align-items:center;gap:6px">${I.fo} DEPARTMENT ACCESS</div>
<div class="nt nt-a" style="margin-bottom:1rem">${I.lk}<span>USER CAN ONLY SEE DEPARTMENTS WHERE ACCESS IS GRANTED (GREEN). LOCKED DEPARTMENTS ARE HIDDEN FROM USER.</span></div>
${(cos||[]).map(co=>`
<div style="margin-bottom:12px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:1rem">
<div style="font-size:11px;font-weight:800;letter-spacing:1px;color:var(--acc);margin-bottom:.75rem;display:flex;align-items:center;gap:6px">${I.co} ${e(co.name.toUpperCase())}</div>
<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px">
${DEPTS.map(dept=>{
const hasAcc=acc?.some(a=>a.company===co.name&&a.dept===dept);
return`<button class="btn btn-sm ${hasAcc?'btn-g':'btn-d'}" id="dacc-${userId}-${co.name}-${dept}"
onclick="toggleDeptAccess(${userId},'${e(co.name)}','${dept}',this)"
style="justify-content:flex-start;gap:8px">
<span style="font-size:14px">${hasAcc?'✓':'✗'}</span>
<span>${dept}</span>
</button>`;
}).join('')}
</div>
</div>`).join('')||'<div style="color:var(--text3);font-size:12px;font-weight:700;text-align:center;padding:1rem;background:var(--card);border-radius:10px">NO COMPANIES FOUND — ADD IN MASTER DATA FIRST</div>'}
</div>
</div>
<div class="mf">
<button class="btn" onclick="cm()">CANCEL</button>
<button class="btn btn-p" onclick="cm();nav('users')">DONE & SAVE</button>
</div>`,'lg');
}
// Toggle individual permission (view/upload/download/create folder)
async function togglePerm(userId,field,btn){
const {data:u}=await sb.from('dv_users').select(field).eq('id',userId).maybeSingle();
const cur=u?.[field]!==false&&u?.[field]!==null?u?.[field]:false;
const newVal=!cur;
const upd={};upd[field]=newVal;
const {error}=await sb.from('dv_users').update(upd).eq('id',userId);
if(error){toast('ERROR: '+error.message,'err');return;}
btn.className='btn btn-sm '+(newVal?'btn-g':'btn-d');
btn.innerHTML=(newVal?'✓ ENABLED':'✗ DISABLED');
toast((newVal?'ENABLED: ':'DISABLED: ')+field.replace('can_','').toUpperCase().replace('_',' '));
}
// Toggle department access
async function toggleDeptAccess(userId,company,dept,btn){
const {data:ex}=await sb.from('dv_user_dept_access').select('id').eq('user_id',userId).eq('company',company).eq('dept',dept).maybeSingle();
if(ex){
await sb.from('dv_user_dept_access').delete().eq('id',ex.id);
btn.className='btn btn-sm btn-d';
btn.innerHTML='<span style="font-size:14px">✗</span><span>'+dept+'</span>';
toast('ACCESS REVOKED SUCCESSFULLY: '+dept,'warn');
}else{
await sb.from('dv_user_dept_access').insert({user_id:userId,company,dept,granted_by:SES.id});
btn.className='btn btn-sm btn-g';
btn.innerHTML='<span style="font-size:14px">✓</span><span>'+dept+'</span>';
toast('ACCESS GRANTED: '+dept,'ok');
}
}
// USER CRUD
function oAU(){openModal(`
<div class="mh"><h3>${I.us} ADD NEW USER</h3><div class="mc" onclick="cm()">&#215;</div></div>
<div class="mb">
<div class="nt nt-b">${I.sh}<span>AFTER CREATING USER, GO TO <strong>MANAGE ACCESS</strong> TO SET PERMISSIONS AND DEPARTMENT ACCESS.</span></div>
<div style="display:grid;gap:13px">
<div class="fr"><div class="fg"><label>FULL NAME *</label><input id="nn" placeholder="EMPLOYEE FULL NAME"></div><div class="fg"><label>DEPARTMENT (INFO ONLY)</label><input id="nd" placeholder="E.G. FINANCE"></div></div>
<div class="fr"><div class="fg"><label>USERNAME *</label><input id="nu" placeholder="LOGIN USERNAME"></div><div class="fg"><label>PASSWORD *</label><input type="password" id="np" placeholder="STRONG PASSWORD"></div></div>
<div class="fg"><label>EMAIL (OPTIONAL)</label><input id="ne" type="email" placeholder="EMAIL@COMPANY.COM"></div>
<div class="nt nt-a" style="margin-bottom:0">${I.lk}<span>NEW USER WILL HAVE <strong>NO ACCESS</strong> BY DEFAULT. USE "MANAGE ACCESS" BUTTON TO GRANT PERMISSIONS AND DEPARTMENT ACCESS AFTER CREATION.</span></div>
</div>
</div>
<div class="mf"><button class="btn" onclick="cm()">CANCEL</button><button class="btn btn-p" onclick="sAU()">CREATE USER</button></div>`);}
async function sAU(){
const n=document.getElementById('nn').value.trim(),u=document.getElementById('nu').value.trim(),p=document.getElementById('np').value;
if(!n||!u||!p){toast('NAME, USERNAME & PASSWORD ARE REQUIRED','err');return;}
const {data:nd2,error}=await sb.from('dv_users').insert({
name:n,dept:document.getElementById('nd').value.trim()||null,
username:u,password:p,email:document.getElementById('ne').value.trim()||null,
can_view:false,can_upload:false,can_download:false,can_create_folder:false,
is_active:true,created_at:new Date().toISOString()
}).select('id').single();
if(error){toast(error.message,'err');return;}
toast('USER CREATED ✓ — NOW SET PERMISSIONS VIA MANAGE ACCESS');
cm();
// Auto-open access panel for new user
setTimeout(()=>openAccessPanel(nd2.id,n),500);
await loadDD();
}
async function eU(id){
const {data:u}=await sb.from('dv_users').select('*').eq('id',id).maybeSingle();if(!u)return;
openModal(`
<div class="mh"><h3>EDIT USER</h3><div class="mc" onclick="cm()">&#215;</div></div>
<div class="mb"><div style="display:grid;gap:13px">
<div class="fr"><div class="fg"><label>FULL NAME</label><input id="en" value="${e(u.name)}"></div><div class="fg"><label>DEPARTMENT</label><input id="ed" value="${e(u.dept||'')}"></div></div>
<div class="fr"><div class="fg"><label>USERNAME</label><input id="eu" value="${e(u.username||'')}"></div><div class="fg"><label>EMAIL</label><input id="ee" value="${e(u.email||'')}"></div></div>
<div><div style="font-size:9px;font-weight:800;letter-spacing:1px;color:var(--text2);margin-bottom:.5rem">PERMISSIONS</div>
<div style="display:flex;gap:16px">
<label style="display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;cursor:pointer"><input type="checkbox" id="eul" ${u.can_upload?'checked':''}> CAN UPLOAD</label>
<label style="display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;cursor:pointer"><input type="checkbox" id="edl" ${u.can_download?'checked':''}> CAN DOWNLOAD</label>
</div>
</div>
</div></div>
<div class="mf"><button class="btn" onclick="cm()">CANCEL</button><button class="btn btn-p" onclick="sEU(${id})">SAVE CHANGES</button></div>`);}
async function sEU(id){
const upd={name:document.getElementById('en').value.trim(),dept:document.getElementById('ed').value.trim()||null,username:document.getElementById('eu').value.trim(),email:document.getElementById('ee').value.trim()||null,can_upload:document.getElementById('eul').checked,can_download:document.getElementById('edl').checked};
await sb.from('dv_users').update(upd).eq('id',id);
toast('USER UPDATED SUCCESSFULLY ✓');cm();await nav('users');await loadDD();
}
function rP(id,name){openModal(`
<div class="mh"><h3>${I.ky} RESET PASSWORD</h3><div class="mc" onclick="cm()">&#215;</div></div>
<div class="mb">
<div class="nt nt-a">${I.sh}<span>RESETTING PASSWORD FOR: <strong>${e(name.toUpperCase())}</strong></span></div>
<div style="display:grid;gap:13px;margin-top:1rem">
<div class="fg"><label>NEW PASSWORD *</label><input type="password" id="rn" placeholder="MIN 6 CHARACTERS"></div>
<div class="fg"><label>CONFIRM *</label><input type="password" id="rc" placeholder="CONFIRM PASSWORD"></div>
</div>
</div>
<div class="mf"><button class="btn" onclick="cm()">CANCEL</button><button class="btn btn-p" onclick="dRP(${id})">RESET PASSWORD</button></div>`);}
async function dRP(id){
const p1=document.getElementById('rn').value,p2=document.getElementById('rc').value;
if(!p1||p1.length<6){toast('MINIMUM 6 CHARACTERS REQUIRED','err');return;}
if(p1!==p2){toast('PASSWORDS DO NOT MATCH','err');return;}
await sb.from('dv_users').update({password:p1}).eq('id',id);
toast('PASSWORD HAS BEEN RESET SUCCESSFULLY ✓');cm();
}
async function tU(id,active){
if(!confirm(`CONFIRM: ARE YOU SURE YOU WANT TO ${active?'DEACTIVATE':'ACTIVATE'} THIS USER?`))return;
await sb.from('dv_users').update({is_active:!active}).eq('id',id);
toast(active?'USER HAS BEEN DEACTIVATED':'USER HAS BEEN ACTIVATED');await nav('users');
}
async function saveSt(){
const u=document.getElementById('au').value.trim();
const oldp=document.getElementById('ao').value;
const p1=document.getElementById('ap').value;
const p2=document.getElementById('ap2').value;
if(!u)return toast('PLEASE ENTER USERNAME','err');
if(p1){
if(!oldp)return toast('PLEASE ENTER CURRENT PASSWORD','err');
const {data:as}=await sb.from('dv_settings').select('admin_password').eq('id',1).maybeSingle();
if(oldp!==(as?.admin_password||'admin123'))return toast('CURRENT PASSWORD IS INCORRECT','err');
if(p1.length<6)return toast('MINIMUM 6 CHARACTERS REQUIRED','err');
if(p1!==p2)return toast('PASSWORDS DO NOT MATCH','err');
}
const upd={admin_username:u};if(p1)upd.admin_password=p1;
const {data:ex}=await sb.from('dv_settings').select('id').eq('id',1).maybeSingle();
if(ex)await sb.from('dv_settings').update(upd).eq('id',1);
else await sb.from('dv_settings').insert({id:1,...upd});
toast('SETTINGS SAVED SUCCESSFULLY ✓');if(p1)setTimeout(()=>doLogout(),2000);
}
document.addEventListener('keydown',ev=>{if(ev.key==='Enter'&&!document.getElementById('ls').classList.contains('hidden'))doLogin();});
</script>
